<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audios-Grupo 3</title>
</head>
<body>

<button onclick="playSound('campanadasBoda')">
    Campanadas de boda
</button>

<button onclick="playSound('latidosdecorazon')">
    Latidos de corazón
</button>

<button onclick="playSound('caballo')">
    Caballo
</button>

<button onclick="playSound('llanto')">
    Llantos de bebé
</button>

<button onclick="playSound('marchanupcial')">
    Marcha Nupcial
</button>

<button onclick="playSound('portazo1')">
    Portazo opción uno
</button>

<button onclick="playSound('portazo2')">
    Portazo opción dos
</button>

<!-- Audios -->
<audio id="campanadasBoda" src="Campanadas.mov"></audio>
<audio id="latidosdecorazon" src="Latidos de corazón.mp4"></audio>
<audio id="caballo" src="Caballo.mov"></audio>
<audio id="llanto" src="Llanto de bebé.mov"></audio>
<audio id="marchanupcial" src="Marcha Nupcial.mov"></audio>
<audio id="portazo1" src="Portazo.mov"></audio>
<audio id="portazo2" src="Portazo 2.mov"></audio>

<script>
function playSound(id) {
    let audio = document.getElementById(id);
    audio.currentTime = 0;
    audio.play();
}

function stopSound(id) {
    let audio = document.getElementById(id);
    audio.pause();
    audio.currentTime = 0; // vuelve al inicio
}
</script>

</body>
</html>
